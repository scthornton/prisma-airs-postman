$kind: http-request
description: "Tests multiple DLP patterns: credit card, SSN, email, phone, IP address. Expected: dlp=true, category=malicious, action=block"
url: https://service.api.aisecurity.paloaltonetworks.com/v1/scan/sync/request
method: POST
headers:
  Content-Type: application/json
  Accept: application/json
body:
  type: json
  content: |-
    {
      "tr_id": "123",
      "ai_profile": {
        "profile_name": "{{airs_profile_name}}"
      },
      "metadata": {
        "app_name": "{{airs_app_name}}",
        "app_user": "{{airs_app_user}}",
        "ai_model": "{{airs_ai_model}}"
      },
      "contents": [
        {
          "prompt": "Credit card: 4532-1234-5678-9010, SSN: 422-93-1392, Email: user@example.com, Phone: 555-123-4567, IP: 192.168.1.1"
        }
      ]
    }
order: 10000
